name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend: lint + migrate + test ──────────────────────────────────────────
  backend:
    name: Backend — Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shivlal
          POSTGRES_PASSWORD: shivlal
          POSTGRES_DB: shivlal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ci-secret-key-not-used-in-production
      DATABASE_URL: postgres://shivlal:shivlal@localhost:5432/shivlal_test
      DB_NAME: shivlal_test
      DB_USER: shivlal
      DB_PASSWORD: shivlal
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies (uv)
        working-directory: backend
        run: uv sync --frozen --group dev

      - name: Django system check
        working-directory: backend
        run: uv run python manage.py check

      - name: Run database migrations
        working-directory: backend
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: |
          set +e
          uv run pytest --tb=short -q
          RESULT=$?
          set -e
          if [ "$RESULT" -eq 5 ]; then
            echo "No tests collected yet — OK"
            exit 0
          fi
          exit $RESULT

  # ── Web: install + production build ─────────────────────────────────────────
  web:
    name: Web — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build production bundle
        working-directory: web
        env:
          VITE_API_URL: https://placeholder.example.com/api
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: web/dist/
          retention-days: 7

  # ── Docker: validate backend image builds cleanly ────────────────────────────
  docker-build:
    name: Docker — Backend Image Build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: shivlal-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
