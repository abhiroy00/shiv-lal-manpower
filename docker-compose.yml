# ─────────────────────────────────────────────────────────────────────────────
#  Shiv Lal Manpower Portal – Docker Compose (development)
#
#  Prerequisites:
#    1. cp backend/.env.example backend/.env   (then fill in values)
#    2. docker compose up --build
#
#  Services:
#    db        – PostgreSQL 16
#    redis     – Redis 7 (Celery broker + result backend)
#    api       – Django dev server  (http://localhost:8000)
#    celery    – Celery worker
#    web       – Vite dev server    (http://localhost:5173)
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  env_file:
    - path: ./backend/.env
      required: false        # copy .env.example → .env before first run
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.dev
    SECRET_KEY: dev-secret-change-in-prod
    DATABASE_URL: postgres://shivlal:shivlal@db:5432/shivlal_db
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    CORS_ALLOWED_ORIGINS: http://localhost:5173

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shivlal_db
      POSTGRES_USER: shivlal
      POSTGRES_PASSWORD: shivlal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shivlal -d shivlal_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Django API (dev server) ─────────────────────────────────────────────────
  api:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery:
    build: ./backend
    command: celery -A config worker -l info -Q celery
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (scheduled tasks) ──────────────────────────────────────────
  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    restart: unless-stopped
    volumes:
      - ./backend:/app
    <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Web (Vite dev server) ─────────────────────────────────────────────
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
